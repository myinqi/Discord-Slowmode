{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block fullcontent %}
<div class="w-full max-w-sm">
    <div class="bg-discord-dark rounded-xl shadow-2xl p-8">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white">Slowmode Bot</h1>
            <p class="text-gray-400 text-sm mt-1">Sign in to the admin panel</p>
        </div>
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
                <input type="text" name="username" required autofocus
                    class="w-full px-3 py-2 bg-discord-darker border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-discord-blurple focus:ring-1 focus:ring-discord-blurple">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-3 py-2 bg-discord-darker border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-discord-blurple focus:ring-1 focus:ring-discord-blurple">
            </div>
            <button type="submit"
                class="w-full py-2.5 bg-discord-blurple hover:bg-discord-blurple/80 text-white rounded-lg font-medium transition-colors">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
