{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold text-white mb-6">Settings</h2>

<div class="bg-discord-dark rounded-xl border border-gray-700/50">
    <div class="px-5 py-4 border-b border-gray-700/50">
        <h3 class="text-white font-semibold">General Settings</h3>
    </div>
    <div class="p-5">
        <form method="POST" class="space-y-5 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Bot Name</label>
                <input type="text" name="bot_name" value="{{ bot_name }}" required
                    class="w-full px-3 py-2 bg-discord-darker border border-gray-700 rounded-lg text-white focus:outline-none focus:border-discord-blurple focus:ring-1 focus:ring-discord-blurple">
                <p class="text-xs text-gray-500 mt-1">Display name used in DMs and the web interface.</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Guild (Server) ID</label>
                <input type="text" name="guild_id" value="{{ guild_id }}" required
                    class="w-full px-3 py-2 bg-discord-darker border border-gray-700 rounded-lg text-white focus:outline-none focus:border-discord-blurple focus:ring-1 focus:ring-discord-blurple">
                <p class="text-xs text-gray-500 mt-1">The Discord server ID the bot operates on. Requires restart to take effect.</p>
            </div>
            <button type="submit"
                class="px-5 py-2.5 bg-discord-blurple hover:bg-discord-blurple/80 text-white rounded-lg font-medium transition-colors">
                Save Settings
            </button>
        </form>
    </div>
</div>
{% endblock %}
